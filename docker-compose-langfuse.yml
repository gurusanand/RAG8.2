# ═══════════════════════════════════════════════════════════════
# Langfuse Self-Hosted — Docker Compose for Banking RAG Observability
# ═══════════════════════════════════════════════════════════════
#
# Usage:
#   docker compose -f docker-compose-langfuse.yml up -d
#
# Access:
#   Langfuse UI:  http://localhost:3100
#   PostgreSQL:   localhost:5433 (internal to Langfuse)
#
# First-time setup:
#   1. Open http://localhost:3100
#   2. Create an account (first user becomes admin)
#   3. Create a project (e.g., "Banking RAG")
#   4. Go to Settings → API Keys → Create New
#   5. Copy the Public Key and Secret Key into your .env file
#
# Port Configuration:
#   Langfuse runs on port 3100 by default (not 3000) to avoid
#   conflicts with other services. Change LANGFUSE_PORT below
#   to use a different port.
#
# ═══════════════════════════════════════════════════════════════

version: "3.9"

x-langfuse-common: &langfuse-env
  DATABASE_URL: postgresql://langfuse:langfuse_password@langfuse-db:5432/langfuse
  NEXTAUTH_URL: http://localhost:${LANGFUSE_PORT:-3100}
  NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-my-super-secret-nextauth-key-change-me}
  SALT: ${LANGFUSE_SALT:-my-super-secret-salt-change-me}
  TELEMETRY_ENABLED: ${LANGFUSE_TELEMETRY:-true}
  LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: ${LANGFUSE_EXPERIMENTAL:-false}

services:
  # ── Langfuse Application Server ──
  langfuse-server:
    image: langfuse/langfuse:2
    container_name: langfuse-server
    restart: unless-stopped
    depends_on:
      langfuse-db:
        condition: service_healthy
    ports:
      - "${LANGFUSE_PORT:-3100}:3000"
    environment:
      <<: *langfuse-env
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/public/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── PostgreSQL Database for Langfuse ──
  langfuse-db:
    image: postgres:16-alpine
    container_name: langfuse-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse_password
      POSTGRES_DB: langfuse
    ports:
      - "${LANGFUSE_DB_PORT:-5433}:5432"
    volumes:
      - langfuse_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  langfuse_postgres_data:
    driver: local
